<body>

    <h1>📊 Reports & Messages</h1>

    <div class="container">

        <!-- Report Form -->
        <form id="reportForm">
            <textarea id="reportText" placeholder="Write your report or issue..." required></textarea>
            <button type="submit">Submit Report</button>
        </form>

        <!-- Reports List -->
        <div id="reportList"></div>

    </div>

    <script>
        const form = document.getElementById('reportForm');
        const reportList = document.getElementById('reportList');

        let reports = JSON.parse(localStorage.getItem('reports')) || [];

        function renderReports() {
            reportList.innerHTML = '';

            reports.forEach((rep, index) => {
                const div = document.createElement('div');
                div.className = 'report';

                div.innerHTML = `
                    <p><strong>User:</strong> ${rep.text}</p>

                    <div class="reply">
                        <strong>Reply:</strong> ${rep.reply ? rep.reply : "No reply yet"}
                    </div>

                    <div class="reply-input">
                        <input type="text" placeholder="Write reply..." id="reply-${index}">
                        <button onclick="addReply(${index})">Reply</button>
                    </div>
                `;

                reportList.appendChild(div);
            });
        }

        function addReply(index) {
            const replyInput = document.getElementById(`reply-${index}`).value;

            if(replyInput.trim() === "") return;

            reports[index].reply = replyInput;

            localStorage.setItem('reports', JSON.stringify(reports));
            renderReports();
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const text = document.getElementById('reportText').value;

            reports.push({ text: text, reply: "" });

            localStorage.setItem('reports', JSON.stringify(reports));

            form.reset();
            renderReports();
        });

        renderReports();
    </script>

</body>
